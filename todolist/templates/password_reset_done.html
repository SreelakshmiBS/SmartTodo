<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent - SmartTodo AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #000000;
            padding: 24px;
        }

        .container {
            background: #ffffff;
            padding: 48px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #f5c518;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #000000, #f5c518);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            display: inline-block;
        }

        h2 {
            margin-bottom: 16px;
            color: #000000;
            font-size: 1.8rem;
            font-weight: 700;
        }

        p {
            color: #555555;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .email-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #f5c518;
            color: #000000;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 700;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #e6b800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 197, 24, 0.3);
        }

        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 24px 0 20px;
        }

        .note {
            font-size: 0.75rem;
            color: #888888;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .container {
                padding: 32px 24px;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="logo">SmartTodo AI</span>
        
        <div class="email-icon">✉</div>
        
        <h2>Check Your Email</h2>
        
        <p>
            We've emailed you instructions for setting your password.
            If an account exists with the email you entered, you should receive them shortly.
        </p>

        <p>
            If you don't receive an email, please make sure you've entered the address correctly.
        </p>

        <div class="divider"></div>

        <a href="{% url 'login_view' %}" class="btn">Back to Login</a>
    
    </div>
</body>
</html>
