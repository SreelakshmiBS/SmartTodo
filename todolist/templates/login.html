<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskFlow AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* login card container */
        .login-container {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
            padding: 40px 36px 44px;
            border: 1px solid #f5c518;
            transition: transform 0.2s ease;
        }

        /* header area with logo */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #000000, #f5c518);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            display: inline-block;
        }

        .login-header h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #000000;
            margin-top: 8px;
            letter-spacing: -0.3px;
        }

        .login-header p {
            color: #666666;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* form styling */
        form {
            margin-top: 8px;
        }

        /* input fields */
        form input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e0e0e0;
            border-radius: 32px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            color: #000000;
        }

        form input:focus {
            border-color: #f5c518;
            box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.2);
            background-color: #ffffff;
        }

        form input::placeholder {
            color: #bbbbbb;
            font-weight: 400;
        }

        /* login button */
        .btn-login {
            width: 100%;
            background-color: #f5c518;
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            padding: 13px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            margin-bottom: 20px;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(245, 197, 24, 0.2);
        }

        .btn-login:hover {
            background-color: #e6b800;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(245, 197, 24, 0.25);
        }

        /* additional links below form */
        .auth-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .auth-links a {
            color: #000000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-links a:hover {
            color: #f5c518;
            text-decoration: underline;
        }

        /* error message styling */
        .error-message {
            background: #fcebe8;
            color: #c44536;
            font-size: 0.8rem;
            padding: 10px 16px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* small note with theme */
        .theme-note {
            text-align: center;
            font-size: 0.7rem;
            color: #aaaaaa;
            margin-top: 24px;
        }

        /* demo credentials hint */
        .demo-hint {
            background: #fef9e6;
            border-radius: 24px;
            padding: 14px 18px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #f5c518;
        }

        .demo-hint p {
            font-size: 0.75rem;
            color: #5c4a00;
        }

        .demo-hint code {
            background: #ffffff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #000000;
            border: 1px solid #f5c518;
            font-weight: 600;
        }

        /* responsive adjustments */
        @media (max-width: 500px) {
            .login-container {
                padding: 32px 24px 36px;
            }
            .login-header h2 {
                font-size: 1.6rem;
            }
            form input {
                padding: 12px 16px;
            }
            .auth-links {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="logo">TaskFlow AI</span>
            <h2>Login</h2>
            <p>Welcome back to your AI-powered todo list</p>
        </div>

        <!-- Django login form -->
        <form method="POST">
            {% csrf_token %}
            
            <input
                type="text"
                name="username"
                placeholder="Username"
                autofocus
                required>
            
            <br><br>
            
            <input
                type="password"
                name="password"
                placeholder="Password"
                required>
            
            <br><br>
            
            <button type="submit" class="btn-login">
                Login
            </button>
        </form>

        <div class="auth-links">
            <a href="{% url 'register' %}">Create an account</a>
            <a href="{% url 'password_reset' %}">Forgot password?</a>
        </div>
    
    </div>
</body>
</html>
