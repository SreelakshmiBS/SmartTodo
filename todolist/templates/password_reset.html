<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TaskFlow AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* forgot password card container */
        .forgot-container {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
            padding: 40px 36px 44px;
            border: 1px solid #f5c518;
            transition: transform 0.2s ease;
        }

        /* header area with logo */
        .forgot-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #000000, #f5c518);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            display: inline-block;
        }

        .forgot-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #000000;
            margin-top: 8px;
            letter-spacing: -0.3px;
        }

        .forgot-header p {
            color: #666666;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* form styling */
        form {
            margin-top: 8px;
        }

        /* email input field */
        form input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e0e0e0;
            border-radius: 32px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            color: #000000;
        }

        form input:focus {
            border-color: #f5c518;
            box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.2);
            background-color: #ffffff;
        }

        form input::placeholder {
            color: #bbbbbb;
            font-weight: 400;
        }

        /* send reset button */
        .btn-send {
            width: 100%;
            background-color: #f5c518;
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            padding: 13px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            margin-bottom: 20px;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(245, 197, 24, 0.2);
        }

        .btn-send:hover {
            background-color: #e6b800;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(245, 197, 24, 0.25);
        }

        /* back to login link */
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .back-link a {
            color: #000000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #f5c518;
            text-decoration: underline;
        }

        /* small note with theme */
        .theme-note {
            text-align: center;
            font-size: 0.7rem;
            color: #aaaaaa;
            margin-top: 24px;
        }

        /* info message styling */
        .info-message {
            background: #fef9e6;
            border: 1px solid #f5c518;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #5c4a00;
            text-align: center;
        }

        /* error message styling */
        .error-message {
            background: #fcebe8;
            border: 1px solid #ffaa9e;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #c44536;
            text-align: center;
        }

        /* responsive adjustments */
        @media (max-width: 500px) {
            .forgot-container {
                padding: 32px 24px 36px;
            }
            .forgot-header h2 {
                font-size: 1.6rem;
            }
            form input {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <span class="logo">TaskFlow AI</span>
            <h2>Forgot Password</h2>
            <p>Enter your email to receive a reset link</p>
        </div>

        <!-- Django password reset form -->
        <form method="POST">
            {% csrf_token %}
            
            <input 
                type="email" 
                name="email" 
                id="id_email"
                placeholder="Enter your email address"
                required
                autofocus>
            
            <button type="submit" class="btn-send">
                Send Reset Link
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'login_view' %}">← Back to Login</a>
        </div>
       
    </div>
</body>
</html>
